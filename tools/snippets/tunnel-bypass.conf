# /etc/nginx/snippets/tunnel-bypass.conf
# Carrier-bypass camouflage + extra WS upgrade aliases for the tunnel stack.
# Generated by tools/server-install.sh — do not edit by hand.
#
# Coexists with:
#   /etc/nginx/snippets/tunnel-locations.conf   (existing /ws-bridge-x9k2 etc)
#   /etc/nginx/snippets/sni-hunter.conf         (release manifest)
#
# Purpose:
#   1. /cdn-cgi/trace returns a Cloudflare-shaped 200 so DPI engines that
#      look for "real cloudflare endpoint" markers see a clean response when
#      a tunnel client uses the "GET /cdn-cgi/trace" decoy as the first half
#      of a [split] payload (the Telkom Unliminet / Safaricom Daima style).
#
#   2. /cdn-cgi/ws and /pop aliases proxy to the same ws-ssh-bridge as
#      /ws-bridge-x9k2. Lets clients use payload patterns that target a
#      Cloudflare-looking path without exposing our random /ws-bridge-x9k2
#      slug, AND keeps the bridge accessible even if a carrier ever
#      blacklists /ws-bridge-x9k2.

# --- Cloudflare trace decoy (always 200, looks legit to DPI) ---
location = /cdn-cgi/trace {
    default_type text/plain;
    add_header Cache-Control "no-store" always;
    add_header CF-RAY "0000000000000000-AMS" always;
    return 200 "fl=000f0\nh=$host\nip=$remote_addr\nts=$msec\nvisit_scheme=https\nuag=$http_user_agent\ncolo=AMS\nsliver=none\nhttp=http/1.1\nloc=KE\ntls=TLSv1.3\nsni=plaintext\nwarp=off\ngateway=off\nrbi=off\nkex=X25519\n";
}

# --- WS upgrade alias #1: /cdn-cgi/ws  → ws-ssh-bridge ---
location = /cdn-cgi/ws {
    proxy_pass http://127.0.0.1:8888;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_buffering     off;
}

# --- WS upgrade alias #2: /pop  → ws-ssh-bridge (mimics CDN PoP path) ---
location = /pop {
    proxy_pass http://127.0.0.1:8888;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_buffering     off;
}

# --- WS upgrade alias #3: /v2ray  → vmess (drops Sec-WebSocket-Key tolerant clients in) ---
location = /v2ray {
    proxy_pass http://127.0.0.1:10000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_buffering     off;
}
